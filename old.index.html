<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC 學生自動打卡系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; }
        .info-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        #scan-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        #scan-btn:active {
            background-color: #388E3C;
            transform: translateY(2px);
        }
        .record-container {
            width: 100%;
            max-width: 600px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 18px;
        }
        th { background-color: #4CAF50; color: white; }
        .status-in { color: #2196F3; font-weight: bold; }
        .status-out { color: #FF9800; font-weight: bold; }
        #message {
            font-size: 24px;
            color: #4CAF50;
            font-weight: bold;
            height: 35px;
            margin-bottom: 15px;
            text-align: center;
        }
        .error-msg { color: #f44336 !important; }
    </style>
</head>
<body>

    <h1>💳 NFC 學生自動打卡系統</h1>
    <div class="info-text">💡 系統會自動判斷：同一張卡片第一次感應為「上課」，第二次為「下課」</div>

    <button id="scan-btn">👉 點擊開始感應 NFC</button>

    <div id="message"></div>

    <div class="record-container">
        <h2>打卡紀錄</h2>
        <table id="recordTable">
            <thead>
                <tr>
                    <th>時間</th>
                    <th>學生姓名 / 卡號</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="recordBody">
                </tbody>
        </table>
    </div>

    <script>
        let lastScanSerialNumber = "";
        let lastScanTime = 0;

        // 【名單設定】在這裡把卡片的晶片序號對應到學生的名字
        const studentNames = {
            "04:a1:b2:c3:d4:e5:f6": "王小明",
            "04:11:22:33:44:55:66": "陳大頭"
        };

        // 【狀態記憶】系統會把每個卡號目前的狀態記在這裡
        const studentStatus = {};

        // 產生「嗶」聲
        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = 1500; 
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        const scanBtn = document.getElementById('scan-btn');
        const msgDiv = document.getElementById('message');

        scanBtn.addEventListener('click', async () => {
            if (!("NDEFReader" in window)) {
                msgDiv.innerText = "❌ 你的設備或瀏覽器不支援 NFC 感應 (請使用 Android Chrome)";
                msgDiv.className = "error-msg";
                return;
            }

            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                scanBtn.innerText = "📡 感應器已開啟，請將卡片靠近設備背面";
                scanBtn.style.backgroundColor = "#2196F3";
                msgDiv.innerText = "";
                msgDiv.className = "";

                ndef.addEventListener("reading", ({ serialNumber }) => {
                    const currentTime = new Date().getTime();
                    
                    // 防連刷機制 (3秒內不重複感應同一張卡)
                    if (serialNumber === lastScanSerialNumber && (currentTime - lastScanTime) < 3000) {
                        return; 
                    }

                    lastScanSerialNumber = serialNumber;
                    lastScanTime = currentTime;

                    playBeep();

                    // 取得現在時間
                    const now = new Date();
                    const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                                       now.getMinutes().toString().padStart(2, '0') + ':' + 
                                       now.getSeconds().toString().padStart(2, '0');

                    // 判斷學生姓名 (找不到對應名字就顯示原始序號)
                    const displayName = studentNames[serialNumber] || serialNumber;

                    // 自動切換上下課狀態
                    let currentStatus = "上課";
                    if (studentStatus[serialNumber] === "上課") {
                        currentStatus = "下課";
                        studentStatus[serialNumber] = "下課"; 
                    } else {
                        currentStatus = "上課";
                        studentStatus[serialNumber] = "上課"; 
                    }

                    // 顯示成功訊息
                    msgDiv.innerText = `✅ 成功：${displayName} 已${currentStatus}`;
                    msgDiv.className = "";
                    setTimeout(() => { 
                        if(msgDiv.innerText.includes(displayName)) msgDiv.innerText = ""; 
                    }, 3000);

                    // 將紀錄加到表格中
                    const tbody = document.getElementById('recordBody');
                    const row = document.createElement('tr');
                    const statusClass = currentStatus === "上課" ? "status-in" : "status-out";

                    row.innerHTML = `
                        <td>${timeString}</td>
                        <td>${displayName}</td>
                        <td class="${statusClass}">${currentStatus}</td>
                    `;
                    tbody.insertBefore(row, tbody.firstChild);
                });

                ndef.addEventListener("readingerror", () => {
                    msgDiv.innerText = "⚠️ 讀取失敗，請重新感應卡片";
                    msgDiv.className = "error-msg";
                    setTimeout(() => msgDiv.innerText = "", 3000);
                });

            } catch (error) {
                msgDiv.innerText = `❌ 無法開啟 NFC：${error.message}`;
                msgDiv.className = "error-msg";
            }
        });
    </script>
</body>
</html>
