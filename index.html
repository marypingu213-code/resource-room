<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC 學生出缺席打卡系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; }
        .controls {
            margin-bottom: 20px;
            background: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls label {
            font-size: 24px;
            margin: 0 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .controls input[type="radio"] {
            transform: scale(1.5);
            margin-right: 10px;
        }
        #scan-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        #scan-btn:active {
            background-color: #388E3C;
            transform: translateY(2px);
        }
        .record-container {
            width: 100%;
            max-width: 600px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 18px;
        }
        th { background-color: #4CAF50; color: white; }
        .status-in { color: #2196F3; font-weight: bold; }
        .status-out { color: #FF9800; font-weight: bold; }
        #message {
            font-size: 24px;
            color: #4CAF50;
            font-weight: bold;
            height: 35px;
            margin-bottom: 15px;
        }
        .error-msg { color: #f44336 !important; }
    </style>
</head>
<body>

    <h1>💳 NFC 學生打卡系統</h1>

    <div class="controls">
        <label>
            <input type="radio" name="status" value="上課" checked> 上課 (Check-in)
        </label>
        <label>
            <input type="radio" name="status" value="下課"> 下課 (Check-out)
        </label>
    </div>

    <button id="scan-btn">👉 點擊開始感應 NFC</button>

    <div id="message"></div>

    <div class="record-container">
        <h2>打卡紀錄</h2>
        <table id="recordTable">
            <thead>
                <tr>
                    <th>時間</th>
                    <th>卡片晶片序號</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="recordBody">
                </tbody>
        </table>
    </div>

    <script>
        let lastScanSerialNumber = "";
        let lastScanTime = 0;

        // 產生「嗶」聲
        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = 1500; // 音調稍微調高一點，類似刷卡機
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        const scanBtn = document.getElementById('scan-btn');
        const msgDiv = document.getElementById('message');

        scanBtn.addEventListener('click', async () => {
            // 檢查瀏覽器是否支援 Web NFC
            if (!("NDEFReader" in window)) {
                msgDiv.innerText = "❌ 你的設備或瀏覽器不支援 NFC 感應 (請使用 Android Chrome)";
                msgDiv.className = "error-msg";
                return;
            }

            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                scanBtn.innerText = "📡 感應器已開啟，請將卡片靠近設備背面";
                scanBtn.style.backgroundColor = "#2196F3";
                msgDiv.innerText = "";
                msgDiv.className = "";

                // 當讀取到 NFC 卡片時觸發
                ndef.addEventListener("reading", ({ serialNumber }) => {
                    const currentTime = new Date().getTime();
                    
                    // 防連刷機制 (3秒)
                    if (serialNumber === lastScanSerialNumber && (currentTime - lastScanTime) < 3000) {
                        return; 
                    }

                    lastScanSerialNumber = serialNumber;
                    lastScanTime = currentTime;

                    playBeep();

                    // 取得狀態與時間
                    const now = new Date();
                    const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                                       now.getMinutes().toString().padStart(2, '0') + ':' + 
                                       now.getSeconds().toString().padStart(2, '0');

                    const statusRadios = document.getElementsByName('status');
                    let currentStatus = "上課";
                    for (let radio of statusRadios) {
                        if (radio.checked) {
                            currentStatus = radio.value;
                            break;
                        }
                    }

                    // 顯示成功訊息 (這裡抓取的是卡片內建的硬體晶片序號)
                    msgDiv.innerText = `✅ 成功：卡號 ${serialNumber} 已${currentStatus}`;
                    msgDiv.className = "";
                    setTimeout(() => { 
                        if(msgDiv.innerText.includes(serialNumber)) msgDiv.innerText = ""; 
                    }, 3000);

                    // 將紀錄加到表格中
                    const tbody = document.getElementById('recordBody');
                    const row = document.createElement('tr');
                    const statusClass = currentStatus === "上課" ? "status-in" : "status-out";

                    row.innerHTML = `
                        <td>${timeString}</td>
                        <td>${serialNumber}</td>
                        <td class="${statusClass}">${currentStatus}</td>
                    `;
                    tbody.insertBefore(row, tbody.firstChild);
                });

                // 處理讀取錯誤（例如卡片拿開太快）
                ndef.addEventListener("readingerror", () => {
                    msgDiv.innerText = "⚠️ 讀取失敗，請重新感應卡片";
                    msgDiv.className = "error-msg";
                    setTimeout(() => msgDiv.innerText = "", 3000);
                });

            } catch (error) {
                msgDiv.innerText = `❌ 無法開啟 NFC：${error.message}`;
                msgDiv.className = "error-msg";
            }
        });
    </script>
</body>
</html>
