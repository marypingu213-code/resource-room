<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生打卡確認畫面 - 完美比例版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #FFF8E1; 
            margin: 0; 
            height: 100vh; /* 鎖定螢幕高度 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            overflow: hidden; /* 防止滾動 */
        }
        
        .card { 
            background: white; 
            width: 95vw; /* 寬度佔螢幕 95% */
            height: 95vh; /* 高度佔螢幕 95% */
            border-radius: 50px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box; 
            padding: 2vh;
        }
        
        #idle-msg { 
            font-size: 8vmin; /* 依據螢幕自動縮放的等待字體 */
            color: #9e9e9e; 
            font-weight: bold; 
        }
        
        #student-info { 
            display: none; /* 預設隱藏 */
            flex-direction: column;
            justify-content: space-evenly; /* 🌟 關鍵：讓所有元素在垂直方向均勻散開 */
            align-items: center;
            height: 100%; 
            width: 100%;
        }
        
        /* 照片比例調降為 35%，確保下面有空間 */
        #s-photo {
            height: 35vh; 
            width: 35vh;
            object-fit: cover;
            border-radius: 50%;
            border: 10px solid #FFF8E1; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: none; 
        }

        /* 姓名 */
        #s-name { 
            font-size: 10vh; 
            color: #333; 
            margin: 0; 
            letter-spacing: 10px; 
        }
        
        /* 狀態 (已上課/已下課) */
        .status { 
            font-size: 8vh; 
            font-weight: bold; 
            margin: 0; 
            padding: 2vh 6vh; 
            border-radius: 40px; 
        }
        .status.in { color: #4CAF50; background-color: #E8F5E9; }
        .status.out { color: #FF9800; background-color: #FFF3E0; }
        
        /* 時間 (幾點幾分) */
        .time { 
            font-size: 6vh; 
            color: #757575; 
            margin: 0;
        }
        
        /* 上課時數 */
        .duration { 
            font-size: 6vh; 
            color: #E91E63; 
            font-weight: bold; 
            margin: 0; 
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="idle-msg">請將卡片靠近手機背面感應 📱</div>

        <div id="student-info">
            <img id="s-photo" src="" alt="學生照片">
            
            <h1 id="s-name">姓名</h1>
            
            <div id="s-status" class="status">狀態</div>
            
            <div id="s-time" class="time">時間</div>
            
            <div id="s-duration" class="duration"></div>
        </div>
    </div>

    <script>
        // Firebase 設定檔
        const firebaseConfig = {
            apiKey: "AIzaSyAPFTAwM7yxBsUQ0NYcC7tMUBYna6em0XU",
            authDomain: "resource-room-a3986.firebaseapp.com",
            databaseURL: "https://resource-room-a3986-default-rtdb.firebaseio.com",
            projectId: "resource-room-a3986",
            storageBucket: "resource-room-a3986.firebasestorage.app",
            messagingSenderId: "76472526974",
            appId: "1:76472526974:web:7625a7719318206883d02f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 📸 照片對應表
        const photoMap = {
            "宇軒": "images/P1.jpg",
            "睿穎": "images/P2.jpg",
            "楷元": "images/P3.jpg",
            "守恩": "images/P4.jpg",
            "書愷": "images/P5.jpg",
            "岷翰": "images/P6.jpg",
            "承熙": "images/P7.jpg"
        };

        db.ref('attendance').on('child_added', (snapshot) => {
            const data = snapshot.val();
            
            document.getElementById('idle-msg').style.display = 'none';
            // 🌟 關鍵：將顯示模式改為 flex，讓 CSS 的均勻排版生效
            document.getElementById('student-info').style.display = 'flex'; 
            
            const photoEl = document.getElementById('s-photo');
            if (photoMap[data.name]) {
                photoEl.src = photoMap[data.name]; 
                photoEl.style.display = 'block';   
            } else {
                photoEl.style.display = 'none';    
            }

            document.getElementById('s-name').innerText = data.name;
            document.getElementById('s-time').innerText = "打卡時間：" + data.time;
            
            const statusEl = document.getElementById('s-status');
            statusEl.innerText = "已" + data.status + "！";
            statusEl.className = "status " + (data.status === "上課" ? "in" : "out");
            
            const durationEl = document.getElementById('s-duration');
            if (data.status === "下課" && data.duration) {
                durationEl.innerText = "🌟 本次上課時數： " + data.duration;
            } else {
                durationEl.innerText = "";
            }
        });
    </script>
</body>
</html>
