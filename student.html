<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生打卡確認畫面</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #FFF8E1; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
        }
        .card { 
            background: white; 
            padding: 50px; 
            border-radius: 40px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 800px; 
        }
        #idle-msg { font-size: 60px; color: #9e9e9e; font-weight: bold; }
        #student-info { display: none; }
        
        #s-photo {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 50%;
            border: 8px solid #FFF8E1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin: 0 auto 30px auto;
            display: none; 
        }

        #s-name { font-size: 90px; color: #333; margin: 0 0 20px 0; letter-spacing: 5px; }
        .status { font-size: 70px; font-weight: bold; margin: 20px 0; padding: 20px; border-radius: 20px; }
        .status.in { color: #4CAF50; background-color: #E8F5E9; }
        .status.out { color: #FF9800; background-color: #FFF3E0; }
        .time { font-size: 35px; color: #757575; }
        .duration { font-size: 40px; color: #E91E63; margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div id="idle-msg">請將卡片靠近手機背面感應 📱</div>
        <div id="student-info">
            <img id="s-photo" src="" alt="學生照片">
            <h1 id="s-name">姓名</h1>
            <div id="s-status" class="status">狀態</div>
            <div id="s-time" class="time">時間</div>
            <div id="s-duration" class="duration"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAPFTAwM7yxBsUQ0NYcC7tMUBYna6em0XU",
            authDomain: "resource-room-a3986.firebaseapp.com",
            databaseURL: "https://resource-room-a3986-default-rtdb.firebaseio.com",
            projectId: "resource-room-a3986",
            storageBucket: "resource-room-a3986.firebasestorage.app",
            messagingSenderId: "76472526974",
            appId: "1:76472526974:web:7625a7719318206883d02f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 📸 照片對應表：幫它加上 "images/" 告訴它去資料夾裡面找
        const photoMap = {
            "宇軒": "images/P1.jpg",
            "睿穎": "images/P2.jpg",
            "楷元": "images/P3.jpg",
            "守恩": "images/P4.jpg",
            "書愷": "images/P5.jpg",
            "岷翰": "images/P6.jpg",
            "承熙": "images/P7.jpg"
        };

        db.ref('attendance').on('child_added', (snapshot) => {
            const data = snapshot.val();
            
            document.getElementById('idle-msg').style.display = 'none';
            document.getElementById('student-info').style.display = 'block';
            
            const photoEl = document.getElementById('s-photo');
            if (photoMap[data.name]) {
                photoEl.src = photoMap[data.name]; 
                photoEl.style.display = 'block';   
            } else {
                photoEl.style.display = 'none';    
            }

            document.getElementById('s-name').innerText = data.name;
            document.getElementById('s-time').innerText = "打卡時間：" + data.time;
            
            const statusEl = document.getElementById('s-status');
            statusEl.innerText = "已" + data.status + "！";
            statusEl.className = "status " + (data.status === "上課" ? "in" : "out");
            
            const durationEl = document.getElementById('s-duration');
            if (data.status === "下課" && data.duration) {
                durationEl.innerText = "🌟 本次上課時數：\n" + data.duration;
            } else {
                durationEl.innerText = "";
            }
        });
    </script>
</body>
</html>
