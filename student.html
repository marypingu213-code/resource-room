<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>學生打卡確認畫面 - 鎖定畫面版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* 🌟 強制鎖定整個網頁，不允許任何滑動 */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100vw;
            height: 100vh; 
            background-color: #FFF8E1; 
            overflow: hidden; /* 絕對禁止出現滾動條 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; /* 防止平板上的雙指縮放或滑動手勢 */
        }
        
        /* 🔊 語音解鎖畫面 */
        #audio-unlock {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
        }
        #audio-unlock h2 { font-size: 6vmin; margin-bottom: 2vh; }
        #audio-unlock p { font-size: 4vmin; color: #FFEB3B; }

        /* 卡片主體：嚴格限制在螢幕的 95% 內 */
        .card { 
            background: white; 
            width: 95vw; 
            height: 95vh; 
            max-height: 95vh; /* 再次強調最大高度 */
            border-radius: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box; 
            padding: 3vh 2vw; /* 使用彈性內距 */
        }
        
        #idle-msg { font-size: 8vmin; color: #9e9e9e; font-weight: bold; }
        
        /* 學生資訊容器：均勻分配垂直空間 */
        #student-info { 
            display: none; 
            flex-direction: column;
            justify-content: space-evenly; /* 讓內容在卡片內平均散開 */
            align-items: center;
            height: 100%; 
            width: 100%;
        }
        
        /* 照片：使用 vmin 確保在橫屏或直屏都不會太大 */
        #s-photo {
            height: 30vmin; 
            width: 30vmin;
            max-height: 250px; /* 設定一個安全上限 */
            max-width: 250px;
            object-fit: cover;
            border-radius: 50%;
            border: 8px solid #FFF8E1; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            display: none; 
            margin: 0;
        }

        /* 文字大小全面改用 vmin (螢幕最短邊的比例) 或彈性 vh，確保絕對裝得下 */
        #s-name { font-size: 8vmin; color: #333; margin: 0; letter-spacing: 5px; }
        
        .status { 
            font-size: 7vmin; 
            font-weight: bold; 
            margin: 0; 
            padding: 1.5vh 4vw; 
            border-radius: 30px; 
        }
        .status.in { color: #4CAF50; background-color: #E8F5E9; }
        .status.out { color: #FF9800; background-color: #FFF3E0; }
        
        .time { font-size: 5vmin; color: #757575; margin: 0; }
        .duration { font-size: 5.5vmin; color: #E91E63; font-weight: bold; margin: 0; line-height: 1.3; }
    </style>
</head>
<body>

    <div id="audio-unlock">
        <h2>👉 請點擊螢幕任意處 👈</h2>
        <p>啟動語音播報功能 🔊</p>
    </div>

    <div class="card">
        <div id="idle-msg">請將卡片靠近手機背面感應 📱</div>

        <div id="student-info">
            <img id="s-photo" src="" alt="學生照片">
            <h1 id="s-name">姓名</h1>
            <div id="s-status" class="status">狀態</div>
            <div id="s-time" class="time">時間</div>
            <div id="s-duration" class="duration"></div>
        </div>
    </div>

    <script>
        document.getElementById('audio-unlock').addEventListener('click', function() {
            this.style.display = 'none';
            let unlockSpeech = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(unlockSpeech);
        });

        const firebaseConfig = {
            apiKey: "AIzaSyAPFTAwM7yxBsUQ0NYcC7tMUBYna6em0XU",
            authDomain: "resource-room-a3986.firebaseapp.com",
            databaseURL: "https://resource-room-a3986-default-rtdb.firebaseio.com",
            projectId: "resource-room-a3986",
            storageBucket: "resource-room-a3986.firebasestorage.app",
            messagingSenderId: "76472526974",
            appId: "1:76472526974:web:7625a7719318206883d02f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const photoMap = {
            "宇軒": "images/P1.jpg",
            "睿穎": "images/P2.jpg",
            "楷元": "images/P3.jpg",
            "守恩": "images/P4.jpg",
            "書愷": "images/P5.jpg",
            "岷翰": "images/P6.jpg",
            "承熙": "images/P7.jpg",
            "盧楷": "images/P8.jpg",
            "意欣": "images/P9.jpg",
            "宇晴": "images/P10.jpg",
            "欽銓": "images/P11.jpg",
            "澄洋": "images/P12.jpg",
            "沄恩": "images/P13.jpg",
            "齊安": "images/P14.jpg"
        };

        let isInitialLoad = true;
        db.ref('attendance').once('value').then(() => {
            isInitialLoad = false; 
        });

        db.ref('attendance').on('child_added', (snapshot) => {
            const data = snapshot.val();
            
            document.getElementById('idle-msg').style.display = 'none';
            document.getElementById('student-info').style.display = 'flex'; 
            
            const photoEl = document.getElementById('s-photo');
            if (photoMap[data.name]) {
                photoEl.src = photoMap[data.name]; 
                photoEl.style.display = 'block';   
            } else {
                photoEl.style.display = 'none';    
            }

            document.getElementById('s-name').innerText = data.name;
            document.getElementById('s-time').innerText = "打卡時間：" + data.time;
            
            const statusEl = document.getElementById('s-status');
            statusEl.innerText = "已" + data.status + "！";
            statusEl.className = "status " + (data.status === "上課" ? "in" : "out");
            
            const durationEl = document.getElementById('s-duration');
            if (data.status === "下課" && data.duration) {
                durationEl.innerText = "🌟 本次上課時數： " + data.duration;
            } else {
                durationEl.innerText = "";
            }

            if (!isInitialLoad && 'speechSynthesis' in window) {
                let textToSpeak = data.name + "，" + data.status;
                let speech = new SpeechSynthesisUtterance(textToSpeak);
                speech.lang = 'zh-TW'; 
                speech.rate = 1.0;     
                window.speechSynthesis.speak(speech);
            }
        });
    </script>
</body>
</html>
