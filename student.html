<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生打卡確認畫面 - 語音升級版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #FFF8E1; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            overflow: hidden; 
        }
        
        /* 🔊 覆蓋在最上層的語音解鎖畫面 */
        #audio-unlock {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
        }
        #audio-unlock h2 { font-size: 8vh; margin-bottom: 2vh; }
        #audio-unlock p { font-size: 4vh; color: #FFEB3B; }

        .card { 
            background: white; 
            width: 95vw; 
            height: 95vh; 
            border-radius: 50px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box; 
            padding: 2vh;
        }
        
        #idle-msg { font-size: 8vmin; color: #9e9e9e; font-weight: bold; }
        
        #student-info { 
            display: none; 
            flex-direction: column;
            justify-content: space-evenly; 
            align-items: center;
            height: 100%; 
            width: 100%;
        }
        
        #s-photo {
            height: 35vh; 
            width: 35vh;
            object-fit: cover;
            border-radius: 50%;
            border: 10px solid #FFF8E1; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: none; 
        }

        #s-name { font-size: 10vh; color: #333; margin: 0; letter-spacing: 10px; }
        .status { font-size: 8vh; font-weight: bold; margin: 0; padding: 2vh 6vh; border-radius: 40px; }
        .status.in { color: #4CAF50; background-color: #E8F5E9; }
        .status.out { color: #FF9800; background-color: #FFF3E0; }
        .time { font-size: 6vh; color: #757575; margin: 0; }
        .duration { font-size: 6vh; color: #E91E63; font-weight: bold; margin: 0; line-height: 1.3; }
    </style>
</head>
<body>

    <div id="audio-unlock">
        <h2>👉 請點擊螢幕任意處 👈</h2>
        <p>啟動語音播報功能 🔊</p>
    </div>

    <div class="card">
        <div id="idle-msg">請將卡片靠近手機背面感應 📱</div>

        <div id="student-info">
            <img id="s-photo" src="" alt="學生照片">
            <h1 id="s-name">姓名</h1>
            <div id="s-status" class="status">狀態</div>
            <div id="s-time" class="time">時間</div>
            <div id="s-duration" class="duration"></div>
        </div>
    </div>

    <script>
        // 解鎖語音功能
        document.getElementById('audio-unlock').addEventListener('click', function() {
            // 點擊後隱藏黑色解鎖畫面
            this.style.display = 'none';
            // 隨便發出一個空的聲音，騙過瀏覽器，正式開啟語音權限
            let unlockSpeech = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(unlockSpeech);
        });

        // 你的 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyAPFTAwM7yxBsUQ0NYcC7tMUBYna6em0XU",
            authDomain: "resource-room-a3986.firebaseapp.com",
            databaseURL: "https://resource-room-a3986-default-rtdb.firebaseio.com",
            projectId: "resource-room-a3986",
            storageBucket: "resource-room-a3986.firebasestorage.app",
            messagingSenderId: "76472526974",
            appId: "1:76472526974:web:7625a7719318206883d02f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 📸 照片對應表
        const photoMap = {
            "宇軒": "images/P1.jpg",
            "睿穎": "images/P2.jpg",
            "楷元": "images/P3.jpg",
            "守恩": "images/P4.jpg",
            "書愷": "images/P5.jpg",
            "岷翰": "images/P6.jpg",
            "承熙": "images/P7.jpg"
        };

        // 🌟 防吵鬧機制：記錄是否為剛開網頁讀取舊資料
        let isInitialLoad = true;
        // Firebase 會在抓完所有舊資料後，觸發這個 'value' 事件
        db.ref('attendance').once('value').then(() => {
            isInitialLoad = false; // 舊資料讀完後，才把開關打開
        });

        db.ref('attendance').on('child_added', (snapshot) => {
            const data = snapshot.val();
            
            // 畫面顯示邏輯
            document.getElementById('idle-msg').style.display = 'none';
            document.getElementById('student-info').style.display = 'flex'; 
            
            const photoEl = document.getElementById('s-photo');
            if (photoMap[data.name]) {
                photoEl.src = photoMap[data.name]; 
                photoEl.style.display = 'block';   
            } else {
                photoEl.style.display = 'none';    
            }

            document.getElementById('s-name').innerText = data.name;
            document.getElementById('s-time').innerText = "打卡時間：" + data.time;
            
            const statusEl = document.getElementById('s-status');
            statusEl.innerText = "已" + data.status + "！";
            statusEl.className = "status " + (data.status === "上課" ? "in" : "out");
            
            const durationEl = document.getElementById('s-duration');
            if (data.status === "下課" && data.duration) {
                durationEl.innerText = "🌟 本次上課時數： " + data.duration;
            } else {
                durationEl.innerText = "";
            }

            // 🔊 語音播報邏輯（只有在非初始讀取時才發聲）
            if (!isInitialLoad && 'speechSynthesis' in window) {
                // 如果只想要說「上課」，把下面這行改成：let textToSpeak = data.status;
                let textToSpeak = data.name + "，" + data.status;
                let speech = new SpeechSynthesisUtterance(textToSpeak);
                speech.lang = 'zh-TW'; // 設定為台灣中文
                speech.rate = 1.0;     // 說話速度 (0.1 ~ 10)
                window.speechSynthesis.speak(speech);
            }
        });
    </script>
</body>
</html>
